version: '3.9'

services:

  # Base de datos PostgreSQL
  db:
    image: postgres:16
    container_name: fashion_db
    environment:
      POSTGRES_DB: fashion_saas
      POSTGRES_USER: fashion_user
      POSTGRES_PASSWORD: fashion_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - fashion_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fashion_user -d fashion_saas"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API principal Django
  django:
    build:
      context: ./backend-django
      dockerfile: Dockerfile
    container_name: fashion_django
    environment:
      - SECRET_KEY=django-insecure-fashion-saas-dev-key
      - DEBUG=True
      - ALLOWED_HOSTS=localhost,127.0.0.1,django
      - DATABASE_URL=postgresql://fashion_user:fashion_password@db:5432/fashion_saas
      - CLOUDINARY_CLOUD_NAME=placeholder
      - CLOUDINARY_API_KEY=placeholder
      - CLOUDINARY_API_SECRET=placeholder
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - fashion_network
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn core.wsgi:application --bind 0.0.0.0:8000"

  # Panel admin Spring Boot
  spring:
    build:
      context: ./backend-spring
      dockerfile: Dockerfile
    container_name: fashion_spring
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/fashion_saas
      - SPRING_DATASOURCE_USERNAME=fashion_user
      - SPRING_DATASOURCE_PASSWORD=fashion_password
      - APP_JWT_SECRET=fashion-saas-jwt-secret-key-must-be-at-least-256-bits-long-for-security
      - APP_JWT_EXPIRATION=3600000
      - APP_DJANGO_API_URL=http://django:8000/api
      - APP_STRIPE_SECRET_KEY=sk_test_placeholder
      - APP_STRIPE_WEBHOOK_SECRET=whsec_placeholder
      - APP_CORS_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - fashion_network

volumes:
  postgres_data:

networks:
  fashion_network:
    driver: bridge