# ===========================
# Configuración de la aplicación
# ===========================
spring.application.name=fashion-saas-admin
server.port=8080

# ===========================
# Base de datos PostgreSQL
# ===========================
spring.datasource.url=jdbc:postgresql://localhost:5432/fashion_saas
spring.datasource.username=fashion_user
spring.datasource.password=fashion_password
spring.datasource.driver-class-name=org.postgresql.Driver

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===========================
# JWT
# ===========================
app.jwt.secret=fashion-saas-jwt-secret-key-must-be-at-least-256-bits-long-for-security
app.jwt.expiration=3600000

# ===========================
# Django API
# ===========================
app.django.api.url=http://localhost:8000/api

# ===========================
# OpenAPI / Swagger
# ===========================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ===========================
# CORS
# ===========================
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ===========================
# Stripe
# ===========================
app.stripe.secret-key=sk_test_tu_clave_secreta_de_stripe
app.stripe.webhook-secret=whsec_tu_webhook_secret